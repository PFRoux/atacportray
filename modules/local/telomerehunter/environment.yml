name: telomerehunter
# TelomereHunter 1.1.0 is python2-only and not on bioconda; it runs from a
# custom container (see modules/local/telomerehunter/Dockerfile). This file
# documents the runtime for reference only.
channels:
  - conda-forge
  - bioconda
dependencies:
  - conda-forge::python=2.7
  - bioconda::samtools=1.9
  - conda-forge::r-base=3.6
  - conda-forge::pysam
