name: "consensus_peaks"
description: Merge per-sample peak calls into a single consensus peak set (BED + SAF)
keywords:
  - peaks
  - consensus
  - atac-seq
  - bedtools
tools:
  - bedtools:
      description: "A powerful toolset for genome arithmetic"
      homepage: "https://bedtools.readthedocs.io"
      documentation: "https://bedtools.readthedocs.io"
      doi: "10.1093/bioinformatics/btq033"
      licence: ["MIT"]
      identifier: "biotools:bedtools"
input:
  - - peaks:
        type: file
        description: Per-sample peak files (narrowPeak/broadPeak/BED)
        pattern: "*.{narrowPeak,broadPeak,bed}"
output:
  bed:
    - "consensus_peaks.bed":
        type: file
        description: Merged consensus peak intervals
        pattern: "consensus_peaks.bed"
  saf:
    - "consensus_peaks.saf":
        type: file
        description: Consensus peaks in SAF format
        pattern: "consensus_peaks.saf"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@atacportray"
maintainers:
  - "@atacportray"
