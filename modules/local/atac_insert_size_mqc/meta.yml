name: "atac_insert_size_mqc"
description: Build a MultiQC custom-content line plot of ATAC-seq fragment sizes from paired-end BAM TLEN values
keywords:
  - atac-seq
  - insert size
  - samtools
  - multiqc
tools:
  - samtools:
      description: Tools for reading/writing/editing/indexing/viewing SAM/BAM/CRAM format.
      homepage: https://www.htslib.org/
      documentation: http://www.htslib.org/doc/samtools.html
      licence: ["MIT"]
input:
  - bams:
      type: file
      description: Coordinate-sorted BAM files.
      pattern: "*.bam"
  - bais:
      type: file
      description: BAM index files.
      pattern: "*.bai"
output:
  mqc:
    - "atac_insert_sizes_mqc.tsv":
        type: file
        description: MultiQC custom-content linegraph with ATAC fragment-size distributions normalized per million fragments
        pattern: "atac_insert_sizes_mqc.tsv"
  sizes:
    - "atac_fragment_sizes.tsv":
        type: file
        description: Fragment-size counts and fragments-per-million values for all samples
        pattern: "atac_fragment_sizes.tsv"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@PFRoux"
maintainers:
  - "@PFRoux"
