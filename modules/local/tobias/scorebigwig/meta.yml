name: "tobias_scorebigwig"
description: Calculate continuous footprint scores from corrected ATAC-seq signal
keywords:
  - atac-seq
  - footprinting
  - tobias
tools:
  - tobias:
      description: "Transcription factor Occupancy prediction By Investigation of ATAC-seq Signal"
      homepage: "https://github.com/loosolab/TOBIAS"
      documentation: "https://github.com/loosolab/TOBIAS/wiki"
      doi: "10.1038/s41467-020-18035-1"
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: "Groovy Map containing sample information e.g. `[ id:'sample1' ]`"
    - corrected:
        type: file
        description: Bias-corrected signal bigWig from TOBIAS ATACorrect
        pattern: "*_corrected.bw"
    - peaks:
        type: file
        description: Peak regions (BED) over which to compute footprint scores
        pattern: "*.{bed,narrowPeak,broadPeak}"
output:
  footprints:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_footprints.bw":
          type: file
          description: Continuous footprint score bigWig
          pattern: "*_footprints.bw"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@atacportray"
maintainers:
  - "@atacportray"
