name: rose
# ROSE (St. Jude python3 fork, github.com/stjude/ROSE) is not on bioconda; it
# runs from the official container image ghcr.io/stjude/abralab/rose (see the
# `container` directive in main.nf). This file documents the runtime for
# reference only — the `conda` profile cannot install ROSE itself.
channels:
  - conda-forge
  - bioconda
dependencies:
  - conda-forge::python>=3.8
  - bioconda::samtools>=1.9
  - conda-forge::r-base>=3.4
  - bioconda::bedtools>=2
