name: "rose"
description: Rank Ordering of Super-Enhancers from ATAC-seq peaks and signal
keywords:
  - super-enhancer
  - enhancer
  - rose
  - atac-seq
tools:
  - rose:
      description: "Rank Ordering of Super-Enhancers (St. Jude python3 fork)"
      homepage: "https://github.com/stjude/ROSE"
      documentation: "https://github.com/stjude/ROSE"
      tool_dev_url: "https://github.com/stjude/ROSE"
      doi: "10.1016/j.cell.2013.03.035"
      licence: ["MIT"]
      identifier: ""
input:
  - - meta:
        type: map
        description: "Groovy Map containing sample information e.g. `[ id:'sample1' ]`"
    - peaks:
        type: file
        description: Constituent enhancer peaks (narrowPeak/BED)
        pattern: "*.{narrowPeak,broadPeak,bed}"
    - bam:
        type: file
        description: Signal BAM (ATAC-seq) used to rank enhancers
        pattern: "*.bam"
    - bai:
        type: file
        description: BAM index
        pattern: "*.bai"
  - genome_build:
      type: string
      description: Genome build label for ROSE fallback annotation (e.g. HG38)
  - annotation:
      type: file
      description: Optional ROSE-compatible UCSC/refSeq-like annotation generated from the input GTF. If empty, ROSE uses its bundled genome annotation.
      pattern: "*.ucsc"
  - stitch:
      type: integer
      description: Stitching distance in bp (notebook 12500)
  - tss_exclusion:
      type: integer
      description: TSS exclusion zone in bp (notebook 2500)
output:
  super_enhancers:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_SuperStitched.table.txt":
          type: file
          description: Ranked super-enhancer table (stitched regions above the cutoff)
          pattern: "*_SuperStitched.table.txt"
  all_enhancers:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_AllStitched.table.txt":
          type: file
          description: All stitched enhancers with signal ranking and super status
          pattern: "*_AllStitched.table.txt"
  enhancers_bed:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_Stitched_withSuper.bed":
          type: file
          description: BED of stitched enhancers flagged for super-enhancer status
          pattern: "*_Stitched_withSuper.bed"
  super_genes:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_SuperStitched.table_withGENES.txt":
          type: file
          description: Super-enhancer table with nearby genes assigned by ROSE_geneMapper
          pattern: "*_SuperStitched.table_withGENES.txt"
  plot:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_Plot_points.png":
          type: file
          description: Super-enhancer hockey-stick plot
          pattern: "*_Plot_points.png"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@atacportray"
maintainers:
  - "@atacportray"
