name: gtf_to_rose_annotation
description: Convert a GTF annotation to the UCSC refSeq-like table format consumed by ROSE.
keywords:
  - gtf
  - rose
  - refseq
  - annotation
tools:
  - python:
      description: Python programming language
      homepage: https://www.python.org/
      licence: ["PSF-2.0"]
input:
  - gtf:
      type: file
      description: Gene annotation in GTF format.
      pattern: "*.gtf"
output:
  annotation:
    - rose_refseq.ucsc:
        type: file
        description: ROSE-compatible UCSC/refSeq-like annotation table.
        pattern: "*.ucsc"
  versions:
    - versions.yml:
        type: file
        description: File containing software versions.
        pattern: "versions.yml"
authors:
  - "@PFRoux"
