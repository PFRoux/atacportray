name: gtf_to_tss_bed
description: Convert gene/transcript features from a GTF annotation to a BED6 TSS file.
keywords:
  - gtf
  - tss
  - bed
tools:
  - python:
      description: General-purpose programming language.
      homepage: https://www.python.org/
      licence: ["PSF-2.0"]
input:
  - gtf:
      type: file
      description: Gene annotation in GTF format.
      pattern: "*.gtf.gz"
output:
  - bed:
      - tss.bed:
          type: file
          description: BED6 file containing one-base TSS intervals.
          pattern: "tss.bed"
  - versions:
      - versions.yml:
          type: file
          description: File containing software versions.
          pattern: "versions.yml"
authors:
  - "@PFRoux"
