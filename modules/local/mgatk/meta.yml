name: "mgatk"
description: Mitochondrial genome analysis toolkit — variant calling from ATAC/scATAC BAMs
keywords:
  - mitochondria
  - variant-calling
  - mgatk
  - atac-seq
tools:
  - mgatk:
      description: "Mitochondrial genome analysis toolkit"
      homepage: "https://github.com/caleblareau/mgatk"
      documentation: "https://github.com/caleblareau/mgatk/wiki"
      doi: "10.1038/s41587-020-0645-6"
      licence: ["MIT"]
      identifier: ""
input:
  - bams:
      type: file
      description: Analysis-ready BAM files (deduplicated, indexed)
      pattern: "*.bam"
  - bais:
      type: file
      description: BAM index files
      pattern: "*.bai"
  - mito_contig:
      type: string
      description: Mitochondrial contig name (e.g. chrM)
  - keep_duplicates:
      type: boolean
      description: Pass --keep-duplicates to mgatk
output:
  variant_stats:
    - "*.mgatk/final/*.variant_stats.tsv.gz":
        type: file
        description: Per-position mitochondrial variant statistics
        pattern: "*.variant_stats.tsv.gz"
  vmr:
    - "*.mgatk/final/*.vmr_strand.tsv.gz":
        type: file
        description: Variance-mean-ratio strand table
        pattern: "*.vmr_strand.tsv.gz"
  coverage:
    - "*.mgatk/final/*.coverage.txt.gz":
        type: file
        description: Per-position mitochondrial coverage
        pattern: "*.coverage.txt.gz"
  rds:
    - "*.mgatk/final/*.rds":
        type: file
        description: mgatk R object containing mitochondrial allele count matrices
        pattern: "*.rds"
  ref_allele:
    - "*.mgatk/final/*_refAllele.txt":
        type: file
        description: Mitochondrial reference allele table
        pattern: "*_refAllele.txt"
  final_dir:
    - "*.mgatk/final/":
        type: directory
        description: mgatk final output directory
  outdir:
    - "*.mgatk/":
        type: directory
        description: Full mgatk output directory
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@atacportray"
maintainers:
  - "@atacportray"
