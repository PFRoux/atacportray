name: "vcf_filter_regions"
description: Filter VCF records to variants whose POS falls in a BED region set
keywords:
  - vcf
  - variants
  - peaks
  - bcftools
tools:
  - bcftools:
      description: "BCFtools is a set of utilities that manipulate variant calls in VCF and BCF format"
      homepage: "https://samtools.github.io/bcftools/"
      documentation: "https://samtools.github.io/bcftools/bcftools.html"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT"]
      identifier: "biotools:bcftools"
input:
  - - meta:
        type: map
        description: Groovy Map containing sample and caller information
    - vcf:
        type: file
        description: Input VCF
        pattern: "*.vcf.gz"
    - regions:
        type: file
        description: BED intervals used as targets
        pattern: "*.bed"
output:
  vcf:
    - - meta:
          type: map
          description: Groovy Map containing sample and caller information
      - "*.vcf.gz":
          type: file
          description: Filtered VCF
          pattern: "*.vcf.gz"
  tbi:
    - - meta:
          type: map
          description: Groovy Map containing sample and caller information
      - "*.vcf.gz.tbi":
          type: file
          description: Tabix index for filtered VCF
          pattern: "*.vcf.gz.tbi"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
authors:
  - "@atacportray"
maintainers:
  - "@atacportray"
