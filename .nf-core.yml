repository_type: pipeline

nf_core_version: 4.0.2

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-atacportray_logo_light.png
    - docs/images/nf-core-atacportray_logo_light.png
    - docs/images/nf-core-atacportray_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .github/CONTRIBUTING.md
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config:
    - report_comment
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - CODE_OF_CONDUCT.md
    - assets/nf-core-atacportray_logo_light.png
    - docs/images/nf-core-atacportray_logo_light.png
    - docs/images/nf-core-atacportray_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
  merge_markers:
    - VALIDATION_REPORT.md
    - modules/nf-core/bowtie2/align/tests/main.nf.test.snap

template:
  org: atacportray
  name: atacportray
  description: Integrative bulk ATAC-seq pipeline extracting epigenomes, genomes,
    CNVs, telomeres and mitochondrial variants from a single ATAC-seq assay
  author: Toumi et al.
  version: 1.0.0dev
  force: true
  outdir: atacportray
  skip_features:
    - gitpod
    - codespaces
    - fastqc
  is_nfcore: false
